# Redis configuration — AI Code Assistant
# Loaded read-only by the redis container.

# ── Persistence ──
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Memory ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Snapshotting (fallback) ──
save 900 1
save 300 10
save 60 10000

# ── Networking ──
bind 0.0.0.0
protected-mode no

# ── Performance ──
tcp-backlog 511
timeout 300
tcp-keepalive 300
databases 16

# ── Slow log ──
slowlog-log-slower-than 10000
slowlog-max-len 128
