# ============================================================================
# AI Code Assistant — Production docker-compose stack
# ============================================================================
#
# Quick start:
#   cp .env.production .env
#   docker compose up -d
#   curl http://localhost:8000/health
#
# Tear down:
#   docker compose down -v
# ============================================================================

version: "3.9"

# ── Services ─────────────────────────────────────────────────────────────────

services:

  # ════════════════════════════════════════════════════════════════════════
  # FastAPI application
  # ════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-code-assistant:latest
    container_name: code-assistant-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WORKERS=${WORKERS:-2}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-86400}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - code-assistant-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # Redis (session memory + tool cache)
  # ════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: code-assistant-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - code-assistant-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  redis-data:
    driver: local
    name: code-assistant-redis-data

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  code-assistant-net:
    driver: bridge
    name: code-assistant-net
